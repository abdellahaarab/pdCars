<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Reviews Dashboard - PD Cars</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f7ff',
              100: '#e9eeff',
              200: '#cfd9ff',
              300: '#a7b8ff',
              400: '#7a8fff',
              500: '#5669ff',
              600: '#3947f5',
              700: '#2f38d7',
              800: '#2830ae',
              900: '#252d89'
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/assets/css/custom.css">
</head>
<body class="text-white selection:bg-brand-500 selection:text-white min-h-screen flex flex-col">

  <!-- HEADER -->
  <div id="header-container"></div>

  <!-- REVIEWS DASHBOARD -->
  <main class="flex-grow pt-24 pb-16">
    <div class="max-w-7xl mx-auto px-6">
      
      <!-- HEADER TITLE & CONTROLS -->
      <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
        <div>
          <p class="text-brand-500 font-semibold mb-1 uppercase tracking-wider text-xs">PD Cars Reviews</p>
          <h1 class="text-4xl font-black text-white tracking-tight">Expert Reviews</h1>
          <p class="text-zinc-500 text-sm mt-1">Read user reviews, pros, cons, and performance scores.</p>
        </div>

        <div class="relative w-full md:max-w-xs">
          <input type="text" id="review-search" placeholder="Search reviews by model..." 
                 class="w-full bg-white/5 border border-white/10 rounded-xl pl-4 pr-10 py-3 text-sm text-white outline-none focus:border-brand-500 transition duration-300">
          <span class="absolute right-3.5 top-3.5 text-zinc-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </span>
        </div>
      </div>

      <!-- REVIEWS FEED -->
      <div id="reviews-dashboard-feed" class="grid lg:grid-cols-2 gap-8">
        <!-- Renders dynamically -->
        <div class="glass h-64 rounded-3xl animate-pulse"></div>
        <div class="glass h-64 rounded-3xl animate-pulse"></div>
      </div>

      <!-- PAGINATION -->
      <div id="reviews-pagination" class="flex justify-center items-center gap-2 pt-12">
        <!-- Pagination controls -->
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer-container"></div>

  <!-- SCRIPTS -->
  <script type="module" src="/assets/js/common.js"></script>
  <script type="module">
    import { ReviewService } from './services/reviews.service.js';
    import { getRatingStars } from './assets/js/utils.js';

    let searchVal = '';
    let currentPage = 1;
    const itemsPerPage = 8;

    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('review-search');
      searchInput.addEventListener('input', () => {
        searchVal = searchInput.value;
        currentPage = 1;
        fetchAndRenderReviews();
      });

      fetchAndRenderReviews();
    });

    async function fetchAndRenderReviews() {
      const feed = document.getElementById('reviews-dashboard-feed');
      const paginationDiv = document.getElementById('reviews-pagination');

      feed.innerHTML = `
        <div class="col-span-full py-12 flex flex-col items-center justify-center">
          <div class="loader-spinner mb-4"></div>
          <p class="text-zinc-500 text-sm">Searching reviews database...</p>
        </div>
      `;

      try {
        const { reviews, total, page, pages } = await ReviewService.getReviews(searchVal, currentPage, itemsPerPage);

        if (reviews.length === 0) {
          feed.innerHTML = `<p class="col-span-full text-center text-zinc-500 py-12">No reviews found matching your search parameters.</p>`;
          paginationDiv.innerHTML = '';
          return;
        }

        feed.innerHTML = reviews.map(rev => `
          <div class="glass border border-white/10 rounded-3xl p-8 flex flex-col justify-between h-full space-y-6">
            <div class="space-y-4">
              <!-- Top Header -->
              <div class="flex justify-between items-start gap-4">
                <div>
                  <h3 class="font-black text-white text-lg hover:text-brand-400 transition leading-snug">
                    <a href="car-details.html?id=${rev.carId}#tab-reviews">${rev.title}</a>
                  </h3>
                  <div class="flex items-center gap-2 text-xs text-zinc-500 mt-1 font-semibold">
                    <span>By <strong class="text-zinc-300 font-bold">${rev.author}</strong></span>
                    <span>•</span>
                    <span>${rev.publishedAt}</span>
                  </div>
                </div>
                <div>
                  ${getRatingStars(rev.rating)}
                </div>
              </div>

              <p class="text-zinc-400 text-sm leading-relaxed">${rev.content}</p>
            </div>

            <!-- Pros / Cons Grid -->
            <div class="grid sm:grid-cols-2 gap-6 pt-4 border-t border-white/5 text-xs">
              <div>
                <h4 class="text-emerald-500 font-bold uppercase tracking-wider mb-2">✓ Pros</h4>
                <ul class="space-y-1.5 text-zinc-450 font-medium">
                  ${rev.pros.map(pro => `<li>• ${pro}</li>`).join('')}
                </ul>
              </div>
              <div>
                <h4 class="text-rose-500 font-bold uppercase tracking-wider mb-2">✗ Cons</h4>
                <ul class="space-y-1.5 text-zinc-450 font-medium">
                  ${rev.cons.map(con => `<li>• ${con}</li>`).join('')}
                </ul>
              </div>
            </div>

            <div class="pt-2">
              <a href="car-details.html?id=${rev.carId}" class="inline-flex text-xs text-brand-400 hover:text-brand-300 font-bold items-center gap-1 transition">
                View Vehicle Specs &rarr;
              </a>
            </div>
          </div>
        `).join('');

        renderPagination(pages, page);
      } catch (e) {
        console.error('Reviews dashboard query failed:', e);
        feed.innerHTML = '<p class="col-span-full text-center text-rose-500">Failed to query reviews catalog.</p>';
      }
    }

    function renderPagination(totalPages, currentPageNum) {
      const paginationDiv = document.getElementById('reviews-pagination');
      if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
      }

      let html = '';
      html += `
        <button class="px-4 py-2.5 rounded-xl border border-white/10 text-xs font-bold transition hover:bg-white/5 disabled:opacity-30 disabled:hover:bg-transparent" 
                ${currentPageNum === 1 ? 'disabled' : ''} onclick="changePage(${currentPageNum - 1})">
          Prev
        </button>
      `;

      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPageNum - 1 && i <= currentPageNum + 1)) {
          html += `
            <button class="w-10 h-10 rounded-xl border ${i === currentPageNum ? 'bg-brand-600 border-brand-500 text-white' : 'border-white/10 text-zinc-400 hover:bg-white/5'} text-xs font-bold transition" 
                    onclick="changePage(${i})">
              ${i}
            </button>
          `;
        } else if (i === currentPageNum - 2 || i === currentPageNum + 2) {
          html += `<span class="text-zinc-600 text-xs px-1">...</span>`;
        }
      }

      html += `
        <button class="px-4 py-2.5 rounded-xl border border-white/10 text-xs font-bold transition hover:bg-white/5 disabled:opacity-30 disabled:hover:bg-transparent" 
                ${currentPageNum === totalPages ? 'disabled' : ''} onclick="changePage(${currentPageNum + 1})">
          Next
        </button>
      `;

      paginationDiv.innerHTML = html;
    }

    window.changePage = (pageNum) => {
      currentPage = pageNum;
      fetchAndRenderReviews();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  </script>
</body>
</html>
